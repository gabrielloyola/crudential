name: crudential

x-app: &app
  build:
    context: .
  image: crudential:local
  environment:
    RAILS_ENV: ${RAILS_ENV:-development}
    RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
    DATABASE_URL: postgres://crudential:crudential@db:5432/crudential_development
    TEST_DATABASE_URL: postgres://crudential:crudential@db:5432/crudential_test
    JOB_CONCURRENCY: ${JOB_CONCURRENCY:-1}
  volumes:
    - .:/rails
  depends_on:
    db:
      condition: service_healthy

services:
  web:
    <<: *app
    command: bash -lc "bin/rails db:prepare && exec bin/rails server -b 0.0.0.0"
    ports:
      - "${RAILS_PORT:-3000}:3000"

  worker:
    <<: *app
    command: bash -lc "bin/rails db:prepare && exec bin/jobs"

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: crudential
      POSTGRES_PASSWORD: crudential
      POSTGRES_DB: crudential_development
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crudential -d crudential_development"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
